# SPDX-License-Identifier: MIT
# VirtRTLab CI — quality gates for kernel modules, daemon, and CLI
#
# Jobs:
#   kernel  : build · checkpatch · sparse · clang-format
#   daemon  : build · clang-tidy · ASAN/UBSAN
#   cli     : ruff · mypy · bandit · pytest
#
# Kernel/daemon integration tests (tests/kernel/, tests/daemon/) require a
# running kernel and are deferred to a self-hosted runner (future issue).

name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

# Pinned kernel version used consistently across all kernel jobs.
# Update KVER and KPKG together when bumping the base kernel.
env:
  KVER: "6.8.0-59-generic"
  CHECKPATCH_TAG: "v6.12"

jobs:

  # ---------------------------------------------------------------------------
  # Kernel — build
  # ---------------------------------------------------------------------------
  kernel-build:
    name: "kernel · build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kernel headers
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            linux-headers-${{ env.KVER }}

      - name: Build out-of-tree modules (-Werror)
        run: |
          make -C kernel/ \
            KDIR=/lib/modules/${{ env.KVER }}/build \
            EXTRA_CFLAGS="-Werror"

  # ---------------------------------------------------------------------------
  # Kernel — checkpatch
  # ---------------------------------------------------------------------------
  kernel-checkpatch:
    name: "kernel · checkpatch"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch checkpatch.pl
        run: |
          BASE="https://raw.githubusercontent.com/torvalds/linux/${{ env.CHECKPATCH_TAG }}/scripts"
          curl -sSfL "$BASE/checkpatch.pl" -o checkpatch.pl
          chmod +x checkpatch.pl

      - name: Run checkpatch --strict
        run: |
          perl checkpatch.pl \
            --strict \
            --no-tree \
            -f kernel/*.c kernel/include/*.h

  # ---------------------------------------------------------------------------
  # Kernel — sparse
  # ---------------------------------------------------------------------------
  kernel-sparse:
    name: "kernel · sparse"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kernel headers + sparse
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            linux-headers-${{ env.KVER }} sparse

      - name: Run sparse (C=2)
        run: |
          make -C kernel/ \
            KDIR=/lib/modules/${{ env.KVER }}/build \
            C=2 CF="-D__CHECK_ENDIAN__"

  # ---------------------------------------------------------------------------
  # Kernel — clang-format
  # ---------------------------------------------------------------------------
  kernel-clang-format:
    name: "kernel · clang-format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang-format

      - name: Check formatting (Linux style)
        run: |
          clang-format --style=Linux --dry-run --Werror \
            kernel/*.c kernel/include/*.h

  # ---------------------------------------------------------------------------
  # Daemon — build
  # ---------------------------------------------------------------------------
  daemon-build:
    name: "daemon · build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build daemon (-Werror)
        run: |
          make -C daemon/ \
            CFLAGS="-Wall -Wextra -O2 -std=gnu11 -Werror"

  # ---------------------------------------------------------------------------
  # Daemon — clang-tidy
  # ---------------------------------------------------------------------------
  daemon-clang-tidy:
    name: "daemon · clang-tidy"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-tidy
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang-tidy

      - name: Run clang-tidy
        run: |
          clang-tidy \
            daemon/main.c \
            daemon/epoll_loop.c \
            daemon/instance.c \
            -- -Wall -Wextra -std=gnu11 -I daemon/

  # ---------------------------------------------------------------------------
  # Daemon — ASAN / UBSAN
  # ---------------------------------------------------------------------------
  daemon-asan:
    name: "daemon · ASAN/UBSAN"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build daemon with sanitizers
        run: |
          make -C daemon/ \
            CFLAGS="-Wall -Wextra -O2 -std=gnu11 -Werror \
                    -fsanitize=address,undefined \
                    -fno-omit-frame-pointer -g"

      - name: Smoke test (--help, no ASAN errors)
        env:
          ASAN_OPTIONS: "abort_on_error=1:detect_leaks=1"
          UBSAN_OPTIONS: "abort_on_error=1"
        run: daemon/virtrtlabd --help

  # ---------------------------------------------------------------------------
  # CLI — ruff (lint + format)
  # ---------------------------------------------------------------------------
  cli-ruff:
    name: "cli · ruff"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint (ruff check)
        run: ruff check cli/

      - name: Format check (ruff format)
        run: ruff format --check cli/

  # ---------------------------------------------------------------------------
  # CLI — mypy (type checking)
  # ---------------------------------------------------------------------------
  cli-mypy:
    name: "cli · mypy"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install mypy
        run: pip install mypy

      - name: Type check (--strict)
        run: mypy --strict cli/virtrtlabctl.py

  # ---------------------------------------------------------------------------
  # CLI — bandit (security)
  # ---------------------------------------------------------------------------
  cli-bandit:
    name: "cli · bandit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit

      - name: Security scan
        run: bandit -r cli/ --severity-level medium

  # ---------------------------------------------------------------------------
  # CLI — pytest (unit + integration)
  # ---------------------------------------------------------------------------
  cli-pytest:
    name: "cli · pytest"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest pytest-cov

      - name: Run tests
        run: pytest tests/cli/ --cov=cli --cov-fail-under=50
